services:
  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: etl-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - etl-network

  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: etl-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - etl-postgres-data:/var/lib/postgresql/data
    networks:
      - etl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Django Backend (API + Admin)
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: etl-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./trfm_inbound:/data/trfm_inbound
      - ./trfm_outbound:/data/trfm_outbound
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - etl-network
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py setup_oauth2 --noinput 2>/dev/null;
             python manage.py seed_uat 2>/dev/null;
             python manage.py runserver 0.0.0.0:8000"

  # ============================================
  # React Frontend (Vite Dev Server)
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: etl-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - etl-network
    command: npm run dev -- --host 0.0.0.0 --port 3000

  # ============================================
  # Mailpit (Development Email)
  # ============================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: etl-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAIL_PORT:-1025}:1025"
    networks:
      - etl-network

  # ============================================
  # Redis (Celery Broker)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: etl-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etl-network

  # ============================================
  # Celery Worker (Async File Processing)
  # ============================================
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: etl-celery-worker
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
      - ./trfm_inbound:/data/trfm_inbound
      - ./trfm_outbound:/data/trfm_outbound
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - etl-network
    command: celery -A config.celery worker -l info --concurrency=4

  # ============================================
  # Celery Beat (Scheduled Task Scheduler)
  # ============================================
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: etl-celery-beat
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
      - ./trfm_inbound:/data/trfm_inbound
      - ./trfm_outbound:/data/trfm_outbound
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - etl-network
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

# ============================================
# Volumes & Networks
# ============================================
volumes:
  etl-postgres-data:
    driver: local

networks:
  etl-network:
    driver: bridge
    name: etl-network
