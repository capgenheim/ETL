<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Unavailable — ETL Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e17;
            font-family: 'Inter', -apple-system, sans-serif;
            color: #e8eaed;
            position: relative;
            overflow: hidden;
        }
        /* Grid background */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,152,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,152,0,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }
        /* Glow */
        .glow {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(244,67,54,0.08) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 520px;
            padding: 0 1.5rem;
        }
        .error-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 900;
            line-height: 1;
            color: transparent;
            -webkit-text-stroke: 2px rgba(244,67,54,0.5);
            text-shadow: 0 0 80px rgba(244,67,54,0.15);
            margin-bottom: 0.5rem;
            user-select: none;
            letter-spacing: -0.04em;
            position: relative;
        }
        .error-code::after {
            content: attr(data-code);
            position: absolute;
            top: 0; left: 0; right: 0;
            -webkit-text-stroke: 2px rgba(244,67,54,0.15);
            text-shadow: 4px 0 rgba(244,67,54,0.1);
            animation: glitch 3s infinite;
        }
        @keyframes glitch {
            0%, 100% { clip-path: inset(0 0 0 0); }
            20% { clip-path: inset(20% 0 60% 0); transform: translateX(2px); }
            40% { clip-path: inset(60% 0 10% 0); transform: translateX(-2px); }
            60% { clip-path: inset(40% 0 30% 0); transform: translateX(1px); }
        }
        .icon { font-size: 2.5rem; margin-bottom: 1rem; }
        .title {
            font-weight: 800;
            color: #f44336;
            margin-bottom: 0.75rem;
            font-size: clamp(1.1rem, 3vw, 1.6rem);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .message {
            color: #8b949e;
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }
        .actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn {
            display: inline-block;
            padding: 0.7rem 2rem;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: #ff9800;
            color: #000;
            border: none;
        }
        .btn-primary:hover {
            background: rgba(255,152,0,0.85);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,152,0,0.3);
        }
        .btn-outline {
            background: transparent;
            color: #ff9800;
            border: 1px solid rgba(255,152,0,0.3);
        }
        .btn-outline:hover {
            border-color: #ff9800;
            background: rgba(255,152,0,0.08);
        }
        .status-bar {
            margin-top: 3rem;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1.25rem;
            border-radius: 20px;
            border: 1px solid rgba(244,67,54,0.15);
            background: rgba(13,17,23,0.8);
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #f44336;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .status-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            color: #8b949e;
            letter-spacing: 0.06em;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <div class="error-code" data-code="504">504</div>
        <div class="icon">⏱️</div>
        <h1 class="title">Gateway Timeout</h1>
        <p class="message">The server took too long to respond. Please try again.</p>
        <div class="actions">
            <a href="/" class="btn btn-primary">Go to Home</a>
            <a href="javascript:location.reload()" class="btn btn-outline">Retry</a>
        </div>
        <div class="status-bar">
            <div class="status-dot"></div>
            <span class="status-text">ETL PLATFORM • STATUS 504</span>
        </div>
    </div>
</body>
</html>
